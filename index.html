<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <title>Student Web Filter Connection Check</title>
  <style>
    :root { --ok:#1a7f37; --bad:#b42318; --muted:#667085; }
    @media screen and (min-width:600px) {
      body {width: 75%}
    }
    body { font-family: system-ui, Segoe UI, Arial, sans-serif; margin: 20px; color:#111827; }
    h1 { font-size: 20px; margin: 0 0 6px; }
    .muted { color: var(--muted); font-size: 13px; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; background: #2563eb; color:#fff; cursor:pointer; }
    button:disabled { opacity: .6; cursor:not-allowed; }
    .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-top: 20px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap: 10px; flex-wrap: wrap; }
    .badge { padding: 2px 14px; border-radius: 999px; font-size: 36px; font-weight: 700; }
    .ok { background: rgba(26,127,55,.12); color: var(--ok); }
    .bad { background: rgba(180,35,24,.12); color: var(--bad); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    th, td { border-top: 1px solid #e5e7eb; padding: 8px 6px; vertical-align: top; }
    th { text-align: left; color:#374151; font-weight: 600; }
    .small { font-size: 12px; }
  </style>
</head>
<body style="margin-top:10px auto; "><div style="display:flex; justify-content: space-around; flex-direction: column; text-align: center;">
  <h1 style="font-size: 22px; width: 75%; margin:auto" >Student Web Filter Connection Check</h1>
  <div class="muted" style="margin-top:20px">
    <div>
      <h3 style="margin:0px">Steps</h3>
      <div style="text-align: left; display:flex; flex-direction: column; width:fit-content; margin:auto">
        <ol>
          <li>Please make sure this device is connected to your home Wifi</li>
          <li>Click on 'Run check' and wait for the PASS or FAIL result</li>
          <li>If result is 'FAIL' please click 'Report to IT'</li>
        </ol>
      </div>
      <div>
        <label style="text-align: center;">
          <input type="checkbox" id="termsChkbx" />
          I acknowledge and consent to this utility collecting publicly available information relating to my internet connection, and I understand that this information will be obtained and used by the GSLC IT Department to resolve the issue.
        </label>
      </div>
    </div>
  </div>

  <div class="row" style="margin:20px 0; display: flex; justify-content: center;">
    <button style="font-size: 20px;" id="runBtn">Run check</button>
  </div>

  <div class="card">
    <div class="row">
      <div><strong>Results</strong></div>
    </div>

    <table>
      <tbody>
        <tr>
          <th>Public IP Address</th>
          <td class="mono" id="publicIp">-</td>
        </tr>
        <tr>
          <th>Internet Service Provider</th>
          <td class="mono" id="isp">-</td>
        </tr>
        <tr>
          <th>ASN</th>
          <td class="mono" id="asn">-</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div style="display:flex; text-align: center; margin-top:20px; justify-content: space-around; font-size: 24px;">
    <div id="overall" class="badge bad">Not run</div>
  </div>
  <div style="margin:20px">
    <button style="font-size: 18px" id="reportBtn">
      Report to IT
    </button>
  </div>
  <script>
    window.fwSettings={
      'widget_id':43000001083
    };
    !function(){if("function"!=typeof window.FreshworksWidget){var n=function(){n.q.push(arguments)};n.q=[],window.FreshworksWidget=n}}() 
  </script>
  <script type='text/javascript' src='https://widget.freshworks.com/widgets/43000001083.js' async defer></script>
<script>
(() => {
  const TIMEOUT_MS = 4000;

  const targets = [
    "https://chub1.imp.us.contentkeeper.net/",
    "https://chub2.imp.us.contentkeeper.net/"
  ];

  var globalip = "";
  var globalasn = "";

  const el = (id) => document.getElementById(id);

  function setBadge(node, ok, text) {
    node.className = "badge " + (ok ? "ok" : "bad");
    node.textContent = text;
  }

  function reportProblem(ip, asn) {
      FreshworksWidget('prefill', 'ticketForm', {
        subject: 'Web Filter Issue',
        description: `Reporting Student Web Filter Connection Check Issue\n\nIP Address: ${ip}\nASN: ${asn}`,
        priority: 1,
        status: 2
      });
      FreshworksWidget('open', 'ticketForm');
  }

  async function withTimeout(promiseFactory) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    const start = performance.now();
    try {
      const res = await promiseFactory(ctrl.signal);
      return { ok: true, ms: performance.now() - start, res };
    } catch (e) {
      const msg = (e && e.message) ? e.message : String(e);
      const isTimeout = String(msg).toLowerCase().includes("aborted");
      return { ok: false, ms: performance.now() - start, error: isTimeout ? `Timeout (${TIMEOUT_MS}ms)` : "Failed to reach" };
    } finally {
      clearTimeout(t);
    }
  }

  async function testEndpoint(url) {
    // no-cors means the response is "opaque"; success indicates the request was sent and a response was received.
    // failures typically indicate DNS/TLS/network blocks.
    return withTimeout((signal) => fetch(url, { mode: "no-cors", cache: "no-store", signal }));
  }

  async function getPublicIp() {
    // Not “seen by YOUR web server” (static sites can’t see headers), but a reliable external view of public IP.
    // If you later add a tiny backend, swap this to your endpoint and return the connecting IP.
    const ipRes = await withTimeout((signal) => fetch("https://api.ipify.org?format=json", { signal, cache: "no-store" }));
    if (!ipRes.ok) return { ok: false, ip: "-", isp: "-", asn: "-" };
    try {
      const {ip} = await ipRes.res.json();
      const ispRes = await withTimeout((signal) => fetch(`https://api.ipapi.is/?=${ip}`, { signal, cache: "no-store" }));
      if (!ispRes.ok) return { ok: false, ip: ip, isp: "-", asn: "-" };
      const data = await ispRes.res.json();
      globalip = ip;
      globalasn = data.asn.asn;
      return { ok: true, ip: data.ip, isp: data.asn.descr, asn: data.asn.asn };
    } catch {
      return { ok: false, ip: "-", isp: "-", asn: "-" };
    }
  }

  async function run() {
    el("runBtn").disabled = true;
    el("reportBtn").disabled = true;
    setBadge(el("overall"), true, "Checking...");

    // Public IP
    el("publicIp").textContent = "Checking...";
    el("isp").textContent = "Checking...";
    el("asn").textContent = "Checking...";
    const ipData = await getPublicIp();
    el("publicIp").textContent = ipData.ok ? ipData.ip : "Unavailable";
    el("isp").textContent = ipData.ok ? ipData.isp : "Unavailable";
    el("asn").textContent = ipData.ok ? ipData.asn : "Unavailable";

    // Endpoint checks
    const results = [];
    for (const url of targets) {
      const r = await testEndpoint(url);
      results.push({ url, ...r });
    }

    const allOk = results.every(r => r.ok);
    setBadge(el("overall"), allOk, allOk ? "PASS" : "FAIL");
    
    el("reportBtn").disabled = allOk ? true : false;
    el("runBtn").disabled = false;
  }

  function updateButtonState(){
    el("runBtn").disabled = !el("termsChkbx").checked;
  }

  el("runBtn").disabled = true;
  el("runBtn").addEventListener("click", run);
  el("termsChkbx").addEventListener("change", updateButtonState);
  el("reportBtn").addEventListener("click", () => {
    reportProblem(globalip, globalasn);
  });
  el("reportBtn").disabled = true;
})();
</script>
</div>
</body>
</html>
